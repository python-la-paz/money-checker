services:
  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: change_me_deploy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      MONGODB_URL: mongodb://admin:change_me_deploy@mongodb:27017/?authSource=admin
      DATABASE_NAME: money_checker
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./geoip:/app/geoip
    restart: unless-stopped

volumes:
  mongo_data:
