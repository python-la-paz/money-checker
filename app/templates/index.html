<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolivianos - Compartir Fotos</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🇧🇴 Bolivianos</h1>
            <p>Verifica la serie de tu billete</p>
        </div>

        <div class="upload-options">
            <div id="cameraOption" class="upload-option">
                <span class="upload-icon">📷</span>
                <h3>Usar Cámara</h3>
                <p>Captura una foto</p>
                <input type="file" id="cameraInput" accept="image/*" capture="environment">
            </div>

            <div id="fileOption" class="upload-option">
                <span class="upload-icon">🖼️</span>
                <h3>Seleccionar Foto</h3>
                <p>Elige de tu galería</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>

        <div id="cameraModal" class="camera-modal" style="display: none;">
            <div class="camera-container">
                <div class="camera-header">
                    <h2>Capturar Foto</h2>
                    <button id="closeCameraBtn" class="close-btn">&times;</button>
                </div>
                <div class="camera-preview">
                    <video id="cameraFeed" autoplay></video>
                    <div class="camera-overlay">
                        <div class="camera-frame"></div>
                    </div>
                </div>
                <canvas id="cameraCanvas" style="display: none;"></canvas>
                <div class="camera-buttons">
                    <button id="captureBtn" class="btn-capture">📷 Capturar</button>
                    <button id="switchCameraBtn" class="btn-switch">🔁 Cambiar</button>
                </div>
            </div>
        </div>

        <div id="selectedFile" class="selected-file">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="button-group">
            <button id="uploadBtn" class="btn-upload" disabled>Subir Foto</button>
            <button id="clearBtn" class="btn-clear">Limpiar</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Subiendo foto...</p>
        </div>

        <div id="responseMessage" class="response-message">
            <h4 id="responseTitle"></h4>
            <p id="responseText"></p>
            <div id="responseMetadata" class="metadata"></div>
        </div>
    </div>

    <footer class="footer">
        <a href="/about" class="footer-link">Acerca de Nosotros</a>
        <span class="footer-separator">•</span>
        <a href="/disclaimer" class="footer-link">Aviso Legal</a>
        <span class="footer-separator">•</span>
        <a href="https://github.com/python-la-paz/money-checker" target="_blank" class="footer-link">GitHub</a>
    </footer>

    <script>
        const cameraOption = document.getElementById('cameraOption');
        const fileOption = document.getElementById('fileOption');
        const cameraInput = document.getElementById('cameraInput');
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const responseMessage = document.getElementById('responseMessage');
        const responseTitle = document.getElementById('responseTitle');
        const responseText = document.getElementById('responseText');
        const responseMetadata = document.getElementById('responseMetadata');

        // Camera modal elements
        const cameraModal = document.getElementById('cameraModal');
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const captureBtn = document.getElementById('captureBtn');
        const closeCameraBtn = document.getElementById('closeCameraBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');

        let selectedFileData = null;
        let cameraStream = null;
        let isCameraActive = false;
        let videoDevices = [];
        let currentDeviceIndex = 0;

        // Camera option handlers - open camera via MediaDevices API
        cameraOption.addEventListener('click', async () => {
            try {
                // First try MediaDevices API (modern approach)
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    await openCameraModal();
                } else {
                    // Fallback to file input
                    cameraInput.click();
                }
            } catch (error) {
                console.log('Camera not available, using file input fallback');
                cameraInput.click();
            }
        });

        cameraInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // File option handlers
        fileOption.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // Camera Modal Functions
        async function openCameraModal() {
            try {
                cameraModal.style.display = 'flex';
                await loadVideoDevices();
                await startCameraStream();
            } catch (error) {
                console.error('Error accessing camera:', error);
                showError('No se pudo acceder a la cámara. Por favor, verifica los permisos.');
                closeCameraModal();
            }
        }

        async function loadVideoDevices() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                videoDevices = [];
                return;
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(device => device.kind === 'videoinput');
            if (currentDeviceIndex >= videoDevices.length) {
                currentDeviceIndex = 0;
            }
        }

        async function startCameraStream() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }

            const deviceId = videoDevices[currentDeviceIndex]?.deviceId;
            const constraints = {
                video: deviceId
                    ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
                    : { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            };

            cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraFeed.srcObject = cameraStream;
            isCameraActive = true;

            if (videoDevices.length <= 1) {
                switchCameraBtn.disabled = true;
                switchCameraBtn.style.opacity = '0.5';
            } else {
                switchCameraBtn.disabled = false;
                switchCameraBtn.style.opacity = '1';
            }
        }

        function closeCameraModal() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            cameraModal.style.display = 'none';
            isCameraActive = false;
        }

        closeCameraBtn.addEventListener('click', closeCameraModal);

        captureBtn.addEventListener('click', () => {
            if (!isCameraActive) return;

            const context = cameraCanvas.getContext('2d');
            cameraCanvas.width = cameraFeed.videoWidth;
            cameraCanvas.height = cameraFeed.videoHeight;
            context.drawImage(cameraFeed, 0, 0);

            cameraCanvas.toBlob((blob) => {
                const file = new File([blob], `camera-${Date.now()}.jpg`, { type: 'image/jpeg' });
                handleFileSelect(file);
                closeCameraModal();
            }, 'image/jpeg', 0.95);
        });

        switchCameraBtn.addEventListener('click', async () => {
            if (videoDevices.length <= 1) {
                return;
            }

            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            try {
                await startCameraStream();
            } catch (error) {
                console.error('Error switching camera:', error);
                showError('No se pudo cambiar la cámara.');
            }
        });

        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) {
                showError('Por favor selecciona una imagen');
                return;
            }

            selectedFileData = file;
            fileName.textContent = `Archivo: ${file.name}`;
            fileSize.textContent = `Tamaño: ${formatFileSize(file.size)}`;
            selectedFile.classList.add('show');
            uploadBtn.disabled = false;
        }

        clearBtn.addEventListener('click', () => {
            cameraInput.value = '';
            fileInput.value = '';
            selectedFileData = null;
            selectedFile.classList.remove('show');
            uploadBtn.disabled = true;
            responseMessage.classList.remove('show');
        });

        uploadBtn.addEventListener('click', uploadPhoto);

        async function uploadPhoto() {
            if (!selectedFileData) {
                showError('Selecciona una foto primero');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFileData);

            loading.style.display = 'block';
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/api/upload-photo', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showSuccess(data);
                    cameraInput.value = '';
                    fileInput.value = '';
                    selectedFileData = null;
                    selectedFile.classList.remove('show');
                } else {
                    showError(data.message || 'Error al subir la foto');
                }
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                loading.style.display = 'none';
                uploadBtn.disabled = !selectedFileData;
            }
        }

        function showSuccess(data) {
            responseMessage.classList.add('show', 'success');
            responseTitle.textContent = '✅ ' + data.message;
            
            const metadata = data.metadata;
            responseMetadata.innerHTML = `
                <div class="metadata-item">
                    <span class="metadata-label">Archivo:</span>
                    <span class="metadata-value">${metadata.filename}</span>
                </div>
                <div class="metadata-item">
                    <span class="metadata-label">Timestamp:</span>
                    <span class="metadata-value">${new Date(metadata.timestamp).toLocaleString()}</span>
                </div>
            `;
        }

        function showError(message) {
            responseMessage.classList.add('show', 'error');
            responseMessage.classList.remove('success');
            responseTitle.textContent = '❌ Error';
            responseText.textContent = message;
            responseMetadata.innerHTML = '';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

    </script>
</body>
</html>
